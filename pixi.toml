[workspace]
name = "nf-germline-short-read-variant-calling"
version = "0.1.0"
description = "Nextflow Workflow for Germline Short Read Variant Calling"
channels = ["conda-forge", "bioconda"]
platforms = ["linux-64"]

[dependencies]
nextflow = ">=25.10.4,<26"
nf-test = ">=0.9.4,<0.10"
singularity = ">=3.8.6,<4"
ensembl-vep = ">=115.2,<116"
samtools = ">=1.21,<2"
picard = ">=3.4.0,<4"
bcftools = ">=1.21,<2"
